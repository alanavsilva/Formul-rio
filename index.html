<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adoção de cães</title>

    <link rel="stylesheet" href="style.css">

</head>

<header>
    <h1>Adote seu melhor amigo!</h1>
</header>

<body>

    <h2>Cadastro</h2>
    <form>
        <div>
            <label for="nome">Nome completo:</label><br>
            <input type="text" id="nome" required /></br>
        </div>

        <div>
            <label for="email">Email:</label><br>
            <input type="text" id="email" required /></br>
        </div>

        <div>
            <label for="telefone">Telefone:</label><br>
            <input type="number" id="telefone" required /></br>
        </div>

        <div>
            <label for="cpf">CPF:</label><br>
            <input type="number" id="cpf" required /></br>
        </div>

        <div>
            <label for="idade">Idade:</label><br>
            <input type="number" id="idade" required /></br>
        </div>

        <div>
            <label for="cidade">Cidade:</label><br>
            <input type="text" id="cidade" required /></br>
        </div>

        <div>
            <label for="tipo">Tipo de moradia:</label><br>
             <input type="radio" name="tipo" value="casa" required /> Casa
            <input type="radio" name="tipo" value="apartamento" /> Apartamento</br>
        </div>

        <div>
            <label for="quintal">Possui quintal?:</label><br>
           <input type="radio" name="quintal" value="sim" required /> Sim
            <input type="radio" name="quintal" value="nao" /> Não</br>
        </div>

        <div>
            <label for="antes">Já teve pet antes?:</label><br>
             <input type="radio" name="antes" value="sim" required /> Sim
            <input type="radio" name="antes" value="nao" /> Não</br>
        </div>

        <div>
            <label for="financeiro">Possui condições financeiras para cuidar do pet?</label> <br>
            <input type="radio" name="financeiro" value="sim" required /> Sim
            <input type="radio" name="financeiro" value="nao" /> Não
        </div>

        <div>
            <label for="horas_sozinho">Quantas horas o animal ficará sozinho por dia?:</label><br>
            <input type="text" id="horas_sozinho" required /></br>
        </div>

        <div>
            <label for="motivo">Motivo da adoção
                <br>(Respostas genéricas como "porque sim" não serão aceitas):</br></label>
            <input type="textarea" id="motivo" required />
        </div>

        <p>Alerta: Caso tenha decidido adotar hoje, cuidado para não ser uma decisão impulsiva!!</p>

        <div>
            <label for="termo"><u>Aceita o termo de responsabilidade:</u></label>
            <input type="checkbox" id="termo" required />
        </div>

        <button type="button" onclick="validacao()">Cadastre-se</button>
    </form>

    <script src="script.js"></script>

</body>

</html>
